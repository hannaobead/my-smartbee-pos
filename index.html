<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>קופה חכמה - SmartBee</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        input { font-size: 24px; padding: 10px; width: 200px; text-align: center; border: 2px solid #ddd; border-radius: 8px; }
        .buttons { margin-top: 20px; }
        button { font-size: 18px; padding: 15px 30px; cursor: pointer; border: none; border-radius: 8px; color: white; transition: 0.3s; margin: 5px; }
        .btn-cash { background: #28a745; }
        .btn-credit { background: #007bff; }
        button:hover { opacity: 0.8; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>קופה מהירה</h1>
    <input type="number" id="amount" placeholder="הכנס סכום" />
    <div class="buttons">
        <button class="btn-cash" onclick="processInvoice(1)">מזומן</button>
        <button class="btn-credit" onclick="processInvoice(3)">אשראי</button>
    </div>
    <div id="status"></div>
</div>

<script>
    async function processInvoice(payType) {
        const amount = document.getElementById('amount').value;
        const statusDiv = document.getElementById('status');

        if (!amount || amount <= 0) {
            alert('נא להזין סכום תקין');
            return;
        }

        statusDiv.innerText = 'מפיק מסמך...';
        statusDiv.style.color = 'orange';

        try {
            const response = await fetch('/api/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, payType })
            });

            const result = await response.json();

            if (response.ok && result.isSuccess) {
                statusDiv.innerText = 'הצלחה! המסמך הופק.';
                statusDiv.style.color = 'green';
                window.open(result.documentUrl, '_blank');
            } else {
                statusDiv.innerText = 'שגיאה: ' + (result.message || 'פרטים ב-Console');
                statusDiv.style.color = 'red';
                console.error('Full Error:', result);
            }
        } catch (error) {
            statusDiv.innerText = 'שגיאת תקשורת: ' + error.message;
            statusDiv.style.color = 'red';
        }
    }
</script>

</body>
</html>

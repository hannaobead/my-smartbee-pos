<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momento Print&Gift</title>
    <style>
        /* עיצוב למסך בלבד */
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; }
        #display { width: 100%; font-size: 45px; padding: 10px; background: #000; border: 1px solid #22c55e; color: #22c55e; text-align: center; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 22px; border-radius: 10px; border: none; cursor: pointer; background: #252525; color: #fff; }
        .pay { grid-column: span 3; background: #22c55e; color: #000; font-weight: bold; }
        .history-btn { grid-column: span 3; background: linear-gradient(135deg, #0ea5e9, #0369a1); color: #fff; font-weight: bold; }
        .history-panel { margin-top: 15px; display: none; background: #0e141c; border: 1px solid #1f3246; border-radius: 14px; padding: 12px; }
        .history-panel h3 { margin: 0; font-size: 16px; color: #d7ecff; }
        .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .history-meta { font-size: 11px; color: #8bb9df; }
        .history-list { max-height: 240px; overflow: auto; font-size: 13px; display: grid; gap: 8px; }
        .history-item { background: #121b26; border: 1px solid #25374c; border-radius: 10px; padding: 9px; }
        .history-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .history-doc { font-size: 14px; font-weight: 700; color: #eef7ff; }
        .history-amount { font-size: 13px; font-weight: 700; color: #0f172a; background: #8de0ff; border-radius: 999px; padding: 3px 8px; }
        .history-date { margin-top: 5px; color: #9fb2c6; font-size: 12px; }
        .history-actions { margin-top: 8px; display: flex; justify-content: flex-end; }
        .history-print-btn { padding: 6px 10px; font-size: 12px; border-radius: 8px; border: 1px solid #2f8f4d; background: #163321; color: #b4f5c9; cursor: pointer; }
        .history-print-btn:hover { background: #1e472d; }
        .history-empty { color: #8ea2b7; font-size: 13px; padding: 8px 2px; }
        
        /* עיצוב לקבלה התרמית - מוסתר במסך */
        #thermal-receipt {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 48mm;
            background: #fff;
            color: #000;
            padding: 1.5mm;
            box-sizing: border-box;
            font-family: "Courier New", "Lucida Console", monospace;
            font-size: 12px;
            line-height: 1.4;
            font-weight: 400;
            letter-spacing: 0;
            overflow: hidden;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        /* הגדרות הדפסה */
        @media print {
            @page {
                size: 48mm auto;
                margin: 0;
            }
            html, body {
                width: 48mm;
                margin: 0;
                padding: 0;
                background: #fff !important;
                color: #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            * {
                text-shadow: none !important;
                filter: none !important;
                transform: none !important;
                font-weight: 400 !important;
            }
            .card { display: none !important; }
            #thermal-receipt {
                position: static !important;
                left: auto;
                width: 48mm !important;
                padding: 1.5mm;
            }
            .receipt-flex {
                display: block;
                margin: 4px 0;
            }
            .receipt-flex span {
                display: block;
                text-align: right;
            }
            .receipt-flex span:last-child {
                text-align: right;
                direction: ltr;
                unicode-bidi: plaintext;
                max-width: 100%;
            }
        }
        .receipt-center { text-align: center; font-weight: 400; }
        .receipt-line { border-bottom: 1px solid #000; margin: 6px 0; }
        .receipt-flex { display: flex; justify-content: space-between; margin: 2px 0; }
        .receipt-amount { direction: ltr; unicode-bidi: plaintext; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center; color: #22c55e;">Momento Pos</h2>
        <input id="display" readonly placeholder="0.00">
        <div class="numpad">
            <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button>
            <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button>
            <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button>
            <button onclick="num('.')">.</button><button onclick="num('0')">0</button><button style="color:red" onclick="clr()">C</button>
            <button class="pay" onclick="pay(1)">הפק והדפס (מזומן)</button>
            <button class="history-btn" onclick="toggleHistory()">היסטוריה</button>
        </div>
        <div id="status" style="margin-top: 15px; text-align: center; font-size: 14px;"></div>
        <div id="history-panel" class="history-panel">
            <div class="history-header">
                <h3>היסטוריית מסמכים</h3>
                <span class="history-meta">POS בלבד</span>
            </div>
            <div id="history-list" class="history-list"></div>
        </div>
    </div>

    <div id="thermal-receipt">
        <div class="receipt-center">
            <h2 style="margin:0">Momento Print&Gift</h2>
            <p style="margin: 5px 0;">עוסק מורשה: 300829397</p>
        </div>
        <div class="receipt-line"></div>
        <div class="receipt-center">
            <b id="r-type">חשבונית מס קבלה</b><br>
            מס': <span id="r-id"></span><br>
            נאמן למקור
        </div>
        <div class="receipt-line"></div>
        <p>תאריך: <span id="r-date"></span></p>
        <div class="receipt-flex">
            <span>סה"כ לפני מע"מ</span>
            <span id="r-subtotal"></span>
        </div>
        <div class="receipt-flex">
            <span>מע"מ (18%)</span>
            <span id="r-vat"></span>
        </div>
        <div class="receipt-flex">
            <span>סה"כ כולל מע"מ</span>
            <span id="r-gross"></span>
        </div>
        <div class="receipt-line"></div>
        <div class="receipt-flex" style="font-size: 1.2em; font-weight: bold;">
            <span>סה"כ לתשלום:</span>
            <span id="r-total"></span>
        </div>
        <div class="receipt-line"></div>
        <p class="receipt-center" style="font-size: 0.9em;">תודה שקניתם אצלינו<br>MOMENTO PRINT & GIFT</p>
    </div>

        <script>
        let s = '';
        const display = document.getElementById('display');
        const status = document.getElementById('status');
        const historyPanel = document.getElementById('history-panel');
        const historyList = document.getElementById('history-list');
        let currentHistoryItems = [];

        function num(n) {
            if (n === '.' && s.includes('.')) return;
            if (n === '.' && s === '') {
                s = '0.';
                display.value = s;
                return;
            }
            if (s.includes('.')) {
                const decimals = s.split('.')[1];
                if (decimals.length >= 2) return;
            }
            s += n;
            display.value = s;
        }

        function clr() {
            s = '';
            display.value = '';
            status.innerHTML = '';
        }

        function parseAmount(value) {
            if (!/^\d+(\.\d{1,2})?$/.test(value)) return null;
            const parsed = Number(value);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
        }

        function formatCurrency(value) {
            return `₪ ${Number(value).toFixed(2)}`;
        }

        function extractDocIndex(result) {
            const direct = result?.index;
            if (typeof direct === 'number' && Number.isFinite(direct)) return String(direct);
            if (typeof direct === 'string' && direct.trim()) return direct.trim();

            const raw = result?.raw;
            if (typeof raw === 'number' && Number.isFinite(raw)) return String(raw);
            if (typeof raw === 'string' && raw.trim()) {
                const asNumber = Number(raw);
                return Number.isFinite(asNumber) ? String(asNumber) : raw.trim();
            }
            if (raw && typeof raw === 'object') {
                const nested = raw.index;
                if (typeof nested === 'number' && Number.isFinite(nested)) return String(nested);
                if (typeof nested === 'string' && nested.trim()) return nested.trim();
            }
            return '-';
        }

        function formatHistoryDate(dateValue) {
            if (!dateValue) return '-';
            const d = new Date(dateValue);
            return Number.isNaN(d.getTime()) ? String(dateValue) : d.toLocaleString('he-IL');
        }

        function getLocalHistory() {
            try {
                const raw = localStorage.getItem('posHistory');
                const data = raw ? JSON.parse(raw) : [];
                return Array.isArray(data) ? data : [];
            } catch {
                return [];
            }
        }

        function saveLocalHistory(item) {
            const history = getLocalHistory();
            history.unshift(item);
            localStorage.setItem('posHistory', JSON.stringify(history.slice(0, 200)));
        }

        function fillReceiptAndPrint({ index, amount, docDate }) {
            const numericAmount = Number(amount || 0);
            const safeAmount = Number.isFinite(numericAmount) ? numericAmount : 0;
            const vatRate = 0.18;
            const subtotal = safeAmount / (1 + vatRate);
            const vatAmount = safeAmount - subtotal;

            document.getElementById('r-id').innerText = index || '-';
            document.getElementById('r-date').innerText = formatHistoryDate(docDate || new Date().toISOString());
            document.getElementById('r-subtotal').innerHTML = '<span class="receipt-amount">' + formatCurrency(subtotal) + '</span>';
            document.getElementById('r-vat').innerHTML = '<span class="receipt-amount">' + formatCurrency(vatAmount) + '</span>';
            document.getElementById('r-gross').innerHTML = '<span class="receipt-amount">' + formatCurrency(safeAmount) + '</span>';
            document.getElementById('r-total').innerHTML = '<span class="receipt-amount">' + formatCurrency(safeAmount) + '</span>';

            setTimeout(() => {
                window.print();
            }, 250);
        }

        function printFromHistory(index) {
            const item = currentHistoryItems[index];
            if (!item) return;
            fillReceiptAndPrint(item);
        }

        function renderHistoryItems(items, noteText) {
            currentHistoryItems = items;
            if (!items || items.length === 0) {
                historyList.innerHTML = '<div class="history-empty">לא נמצאו מסמכי POS בטווח שנבחר.</div>';
                return;
            }
            const note = noteText ? `<div class="history-empty" style="margin-bottom:8px">${noteText}</div>` : '';
            historyList.innerHTML = note + items.map((item, idx) => `
                <div class="history-item">
                    <div class="history-top">
                        <span class="history-doc">#${item.index || '-'}</span>
                        <span class="history-amount">${Number(item.amount || 0).toFixed(2)} ₪</span>
                    </div>
                    <div class="history-date">${formatHistoryDate(item.docDate)}</div>
                    <div class="history-actions">
                        <button class="history-print-btn" onclick="printFromHistory(${idx})">הדפס</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadHistory() {
            historyList.innerHTML = '<div class="history-empty">טוען...</div>';
            try {
                const toDate = new Date().toISOString();
                const fromDate = new Date(Date.now() - 1000 * 60 * 60 * 24 * 30).toISOString();
                const r = await fetch(`/api/history?page=1&amountPerPage=30&fromDate=${encodeURIComponent(fromDate)}&toDate=${encodeURIComponent(toDate)}`);
                const data = await r.json();
                if (!r.ok) {
                    throw new Error(data.error || 'שגיאה בטעינת היסטוריה');
                }

                if (!data.items || data.items.length === 0) {
                    historyList.innerHTML = '<div class="history-empty">לא נמצאו מסמכי POS בטווח שנבחר.</div>';
                    return;
                }

                renderHistoryItems(data.items);
            } catch (e) {
                const local = getLocalHistory();
                if (local.length > 0) {
                    renderHistoryItems(local, 'הוצג גיבוי מקומי (ל־Smartbee אין הרשאה כרגע לחיפוש מסמכים).');
                } else {
                    historyList.innerHTML = `<div class="history-empty">שגיאה: ${e.message || 'לא ניתן לטעון היסטוריה'}</div>`;
                }
            }
        }

        function toggleHistory() {
            const open = historyPanel.style.display === 'block';
            historyPanel.style.display = open ? 'none' : 'block';
            if (!open) loadHistory();
        }

        async function pay(type) {
            const amount = parseAmount(s);
            if (!amount) {
                alert('נא להזין סכום תקין');
                return;
            }

            status.style.color = '#aaa';
            status.innerText = 'מפיק חשבונית...';

            try {
                const r = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount.toFixed(2), payType: type })
                });
                let data = {};
                try {
                    data = await r.json();
                } catch {
                    data = {};
                }

                if (r.ok && (data.resultCodeId === 101 || data.resultCodeId === 102)) {
                    const docIndex = extractDocIndex(data?.result);
                    const docDate = new Date().toISOString();
                    const historyItem = { index: docIndex, amount: amount.toFixed(2), docDate };
                    saveLocalHistory(historyItem);
                    fillReceiptAndPrint(historyItem);

                    status.innerHTML = '<b style="color:#22c55e">הצלחה, שולח להדפסה...</b>';
                    setTimeout(() => clr(), 900);
                } else {
                    status.style.color = 'red';
                    const serverMessage = data.message || data.error || data.details?.message || ('תקלה בשרת (' + r.status + ')');
                    status.innerText = 'שגיאה: ' + serverMessage;
                }
            } catch (e) {
                status.style.color = 'red';
                status.innerText = 'תקלה בתקשורת';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קופה - Espresso Art</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; width: 320px; }
        input { font-size: 28px; padding: 10px; width: 80%; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
        .btn { font-size: 20px; padding: 15px; width: 100%; cursor: pointer; border: none; border-radius: 10px; color: white; margin-bottom: 10px; font-weight: bold; }
        .btn-cash { background: #28a745; }
        .btn-credit { background: #007bff; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>Espresso Art</h2>
    <input type="number" id="amount" placeholder="סכום לתשלום" step="0.1" />
    <button class="btn btn-cash" onclick="pay(1)">מזומן</button>
    <button class="btn btn-credit" onclick="pay(3)">אשראי</button>
    <div id="status"></div>
</div>

<script>
    async function pay(payType) {
        const amount = document.getElementById('amount').value;
        const status = document.getElementById('status');

        if (!amount || amount <= 0) {
            alert('הזן סכום תקין');
            return;
        }

        status.innerText = 'מפיק חשבונית...';
        
        try {
            const response = await fetch('https://www.espressoart.co.il/smartbee-proxy.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: parseFloat(amount), payType: parseInt(payType) })
            });

            const result = await response.json();

            if (result.isSuccess) {
                status.innerText = '✅ בוצע בהצלחה!';
                status.style.color = 'green';
                if (result.documentUrl) window.open(result.documentUrl, '_blank');
            } else {
                status.innerText = '❌ שגיאה: ' + (result.message || 'תקלה בסמארטבי');
                status.style.color = 'red';
                console.log('SmartBee response:', result);
            }
        } catch (err) {
            status.innerText = '❌ שגיאת חיבור לשרת';
            status.style.color = 'red';
            console.error(err);
        }
    }
</script>

</body>
</html>

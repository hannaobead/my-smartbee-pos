<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momento Print&Gift</title>
    <style>
        /* עיצוב למסך בלבד */
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; }
        #display { width: 100%; font-size: 45px; padding: 10px; background: #000; border: 1px solid #22c55e; color: #22c55e; text-align: center; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 22px; border-radius: 10px; border: none; cursor: pointer; background: #252525; color: #fff; }
        .pay { grid-column: span 3; background: #22c55e; color: #000; font-weight: bold; }
        
        /* עיצוב לקבלה התרמית - מוסתר במסך */
        #thermal-receipt {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 48mm;
            background: #fff;
            color: #000;
            padding: 1.5mm;
            box-sizing: border-box;
            font-family: "Courier New", "Lucida Console", monospace;
            font-size: 11px;
            line-height: 1.35;
            font-weight: 400;
            letter-spacing: 0;
        }
        #print-image {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 48mm;
            display: none;
        }

        /* הגדרות הדפסה */
        @media print {
            @page {
                size: 58mm auto;
                margin: 0;
            }
            html, body {
                width: 58mm;
                margin: 0;
                padding: 0;
                background: #fff !important;
                color: #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            * {
                text-shadow: none !important;
                filter: none !important;
                transform: none !important;
                font-weight: 400 !important;
            }
            .card { display: none !important; }
            #thermal-receipt { display: none !important; }
            #thermal-receipt {
                position: static !important;
                left: auto;
                width: 48mm !important;
                padding: 1.5mm;
            }
            #print-image {
                display: block !important;
                position: static !important;
                left: auto;
                width: 48mm !important;
            }
            .receipt-flex {
                display: block;
                margin: 4px 0;
            }
            .receipt-flex span {
                display: block;
                text-align: right;
            }
            .receipt-flex span:last-child {
                text-align: left;
                direction: ltr;
                unicode-bidi: plaintext;
            }
        }
        .receipt-center { text-align: center; font-weight: 400; }
        .receipt-line { border-bottom: 1px solid #000; margin: 6px 0; }
        .receipt-flex { display: flex; justify-content: space-between; margin: 2px 0; }
        .receipt-amount { direction: ltr; unicode-bidi: plaintext; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center; color: #22c55e;">Momento Pos</h2>
        <input id="display" readonly placeholder="0.00">
        <div class="numpad">
            <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button>
            <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button>
            <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button>
            <button onclick="num('.')">.</button><button onclick="num('0')">0</button><button style="color:red" onclick="clr()">C</button>
            <button class="pay" onclick="pay(1)">הפק והדפס (מזומן)</button>
        </div>
        <div id="status" style="margin-top: 15px; text-align: center; font-size: 14px;"></div>
    </div>

    <div id="thermal-receipt">
        <div class="receipt-center">
            <h2 style="margin:0">Momento Print&Gift</h2>
            <p style="margin: 5px 0;">עוסק מורשה: 000000000</p>
        </div>
        <div class="receipt-line"></div>
        <div class="receipt-center">
            <b id="r-type">חשבונית מס קבלה</b><br>
            מקור<br>
            מספר: <span id="r-id"></span>
        </div>
        <div class="receipt-line"></div>
        <p>תאריך: <span id="r-date"></span></p>
        <div class="receipt-flex">
            <span>מכירה כללית (כולל מע"מ)</span>
            <span id="r-amount"></span>
        </div>
        <div class="receipt-line"></div>
        <div class="receipt-flex" style="font-size: 1.2em; font-weight: bold;">
            <span>סה"כ לתשלום:</span>
            <span id="r-total"></span>
        </div>
        <div class="receipt-line"></div>
        <p class="receipt-center" style="font-size: 0.9em;">תודה שקניתם באספרסו ארט!</p>
    </div>
    <img id="print-image" alt="Receipt bitmap for print">

        <script>
        let s = '';
        const display = document.getElementById('display');
        const status = document.getElementById('status');

        function num(n) {
            if (n === '.' && s.includes('.')) return;
            if (n === '.' && s === '') {
                s = '0.';
                display.value = s;
                return;
            }
            if (s.includes('.')) {
                const decimals = s.split('.')[1];
                if (decimals.length >= 2) return;
            }
            s += n;
            display.value = s;
        }

        function clr() {
            s = '';
            display.value = '';
            status.innerHTML = '';
        }

        function parseAmount(value) {
            if (!/^\d+(\.\d{1,2})?$/.test(value)) return null;
            const parsed = Number(value);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
        }

        function renderPrintBitmap(docId, amount, dateText) {
            const width = 384;
            const lineHeight = 24;
            const lines = [
                'MOMENTO PRINT&GIFT',
                '------------------------------',
                'INVOICE RECEIPT',
                'NO: ' + docId,
                'DATE: ' + dateText,
                '',
                'GENERAL SALE',
                'TOTAL: ' + amount.toFixed(2) + ' ILS',
                '',
                'THANK YOU'
            ];

            const height = (lines.length + 2) * lineHeight;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#000';
            ctx.font = '22px "Courier New", monospace';
            ctx.textBaseline = 'top';

            lines.forEach((line, i) => {
                const y = 8 + i * lineHeight;
                const textWidth = ctx.measureText(line).width;
                const x = Math.max(4, Math.floor((width - textWidth) / 2));
                ctx.fillText(line, x, y);
            });

            document.getElementById('print-image').src = canvas.toDataURL('image/png');
        }

        async function pay(type) {
            const amount = parseAmount(s);
            if (!amount) {
                alert('נא להזין סכום תקין');
                return;
            }

            status.style.color = '#aaa';
            status.innerText = 'מפיק חשבונית...';

            try {
                const r = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount.toFixed(2), payType: type })
                });
                let data = {};
                try {
                    data = await r.json();
                } catch {
                    data = {};
                }

                if (r.ok && (data.resultCodeId === 101 || data.resultCodeId === 102)) {
                    const docId = data.result?.index || data.result || '-';
                    const dateText = new Date().toLocaleString('he-IL');
                    document.getElementById('r-id').innerText = docId;
                    document.getElementById('r-date').innerText = dateText;
                    document.getElementById('r-amount').innerHTML = '<span class="receipt-amount">' + amount.toFixed(2) + ' ILS</span>';
                    document.getElementById('r-total').innerHTML = '<span class="receipt-amount">' + amount.toFixed(2) + ' ILS</span>';
                    renderPrintBitmap(docId, amount, dateText);

                    status.innerHTML = '<b style="color:#22c55e">Printing...</b>';

                    setTimeout(() => {
                        window.print();
                        clr();
                    }, 800);
                } else {
                    status.style.color = 'red';
                    const serverMessage = data.message || data.error || data.details?.message || ('תקלה בשרת (' + r.status + ')');
                    status.innerText = 'שגיאה: ' + serverMessage;
                }
            } catch (e) {
                status.style.color = 'red';
                status.innerText = 'תקלה בתקשורת';
            }
        }
    </script>
</body>
</html>
